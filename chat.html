<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>交通时空知识图谱 - 智能查询</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Microsoft YaHei', sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column; }
.header { background: #16213e; padding: 14px 20px; text-align: center; border-bottom: 1px solid #0f3460; }
.header h1 { font-size: 18px; font-weight: 500; color: #e94560; }
.header span { font-size: 12px; color: #888; }
.chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
.msg { display: flex; gap: 10px; max-width: 85%; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.bot { align-self: flex-start; }
.avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
.msg.user .avatar { background: #e94560; }
.msg.bot .avatar { background: #0f3460; }
.bubble { padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.6; }
.msg.user .bubble { background: #e94560; color: #fff; border-bottom-right-radius: 4px; }
.msg.bot .bubble { background: #16213e; border: 1px solid #0f3460; border-bottom-left-radius: 4px; }
.cypher-tag { font-size: 11px; color: #e94560; margin-top: 6px; opacity: 0.8; cursor: pointer; }
.cypher-tag:hover { opacity: 1; }
.loading .dots span { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #888; margin: 0 2px; animation: dot 1.4s infinite ease-in-out both; }
.loading .dots span:nth-child(1) { animation-delay: -0.32s; }
.loading .dots span:nth-child(2) { animation-delay: -0.16s; }
@keyframes dot { 0%,80%,100% { transform: scale(0); } 40% { transform: scale(1); } }
.input-area { padding: 14px 20px; background: #16213e; border-top: 1px solid #0f3460; display: flex; gap: 10px; }
.input-area input { flex: 1; padding: 10px 14px; border-radius: 20px; border: 1px solid #0f3460; background: #1a1a2e; color: #eee; font-size: 14px; outline: none; }
.input-area input:focus { border-color: #e94560; }
.input-area button { padding: 10px 20px; border-radius: 20px; border: none; background: #e94560; color: #fff; font-size: 14px; cursor: pointer; }
.input-area button:hover { background: #c73e54; }
.input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>
<div class="header">
  <h1>交通时空知识图谱</h1>
  <span>207个LA传感器 · DeepSeek · Neo4j · DCRNN</span>
</div>
<div class="chat" id="chat">
  <div class="msg bot">
    <div class="avatar">KG</div>
    <div class="bubble">你好！我是交通时空知识图谱助手。<br>可以问我传感器、道路类型、预测误差、POI 等问题。<br><br>试试：<br>• "高速公路传感器平均误差多少？"<br>• "预测最难的5个传感器在哪？"<br>• "周边餐厅最多的传感器？"</div>
  </div>
</div>
<div class="input-area">
  <input id="q" placeholder="输入中文问题..." onkeydown="if(event.key==='Enter')ask()">
  <button id="btn" onclick="ask()">发送</button>
</div>
<script>
function addMsg(role, text, cypher) {
  const d = document.createElement('div');
  d.className = `msg ${role}`;
  d.innerHTML = `<div class="avatar">${role==='user'?'你':'KG'}</div>
    <div class="bubble">${text}${cypher?`<div class="cypher-tag" title="${cypher}">Cypher &#9654;</div>`:''}</div>`;
  document.getElementById('chat').appendChild(d);
  document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
}
function addLoading() {
  const d = document.createElement('div');
  d.className = 'msg bot loading';
  d.id = 'loading';
  d.innerHTML = `<div class="avatar">KG</div><div class="bubble"><div class="dots"><span></span><span></span><span></span></div></div>`;
  document.getElementById('chat').appendChild(d);
  document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
}
function removeLoading() { const e = document.getElementById('loading'); if(e) e.remove(); }

async function ask() {
  const inp = document.getElementById('q');
  const btn = document.getElementById('btn');
  const q = inp.value.trim();
  if (!q) return;
  addMsg('user', q);
  inp.value = '';
  btn.disabled = true;
  addLoading();
  try {
    const r = await fetch('/api/query', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({question:q}) });
    const d = await r.json();
    removeLoading();
    if (d.error) addMsg('bot', '错误: ' + d.error);
    else addMsg('bot', d.answer, d.cypher);
  } catch(e) {
    removeLoading();
    addMsg('bot', '网络错误: ' + e.message);
  }
  btn.disabled = false;
}
</script>
</body>
</html>
